name: Release

# Obsidian Community Plugin Store convention: tags WITHOUT "v" prefix
# e.g. "0.2.0", NOT "v0.2.0"
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  # V0.2.2 — required for actions/attest-build-provenance to sign the release
  # assets so users can cryptographically verify they were built from this repo.
  # Closes the Obsidian submission Recommendation:
  # "Missing GitHub artifact attestations for release assets"
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin (production)
        run: npm run build

      - name: Verify bundle size
        run: |
          SIZE=$(stat -c%s main.js 2>/dev/null || stat -f%z main.js)
          echo "main.js size: ${SIZE} bytes"
          # Guard against accidentally bundling CodeMirror (marked external in esbuild)
          if [ "$SIZE" -gt 500000 ]; then
            echo "ERROR: main.js > 500 KB — @codemirror/* may have been bundled"
            exit 1
          fi

      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create or update the release (idempotent re-run)
          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists — uploading assets"
            gh release upload "$VERSION" main.js manifest.json styles.css --clobber
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
